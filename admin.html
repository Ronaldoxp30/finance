<!DOCTYPE html>
<html lang="pt-br">

<head>

  <meta charset="UTF-8">

  <title>
    Painel Admin
  </title>

  <script src="https://cdn.jsdelivr.net/npm/@supabase/supabase-js"></script>

  <style>

    body{

      background:#0f172a;
      color:#fff;
      font-family:Arial;
      padding:20px;
    }

    h1{
      margin-bottom:30px;
    }

    .cliente{

      background:#1e293b;

      padding:20px;

      border-radius:20px;

      margin-bottom:15px;

      display:flex;

      justify-content:space-between;

      align-items:center;
    }

    button{

      border:none;

      padding:10px 20px;

      border-radius:10px;

      cursor:pointer;

      margin-left:10px;
    }

    .bloquear{

      background:red;
      color:#fff;
    }

    .liberar{

      background:#10b981;
      color:#fff;
    }

    .atrasado{

      color:red;
      font-weight:bold;
    }

  </style>

</head>

<body>

  <h1>
    Painel Administrativo
  </h1>

  <div id="clientes"></div>

  <script src="admin.js"></script>

</body>
</html>
